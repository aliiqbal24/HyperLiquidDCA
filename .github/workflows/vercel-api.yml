name: Deploy HypeDCA API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vercel-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm install -g vercel@50.28.0

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --cwd apps/api --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --cwd apps/api --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --cwd apps/api --token=${{ secrets.VERCEL_TOKEN }}
